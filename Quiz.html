<!DOCTYPE html>
<html>
 <head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="stylesheet.css">
  <title>Interactive Quiz Game</title>
 </head>
 <body>
  <section id="start-screen" class="">
   <button id="start-btn" onclick="startGame()">Start The Quiz!</button>
  </section>

  <section id="quiz-screen" class="hidden">
   <section id="progress">
    <div id="Rectangle1"></div>
    <div id="quiz-nodes">
     <div class="quiz-node prev-node">1</div>
     <div class="quiz-node prev-node">2</div>
     <div class="quiz-node prev-node">3</div>
     <div class="quiz-node prev-node">4</div>
     <div class="quiz-node current-node">5</div>
     <div class="quiz-node next-node">6</div>
     <div class="quiz-node next-node">7</div>
     <div class="quiz-node next-node">8</div>
     <div class="quiz-node next-node">9</div>
     <div class="quiz-node next-node">10</div>
    </div>
   </section>

   <section id="question">
    <p>questionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestionquestion</p>
   </section>

   <section id="answers">
    <button id="ans1" class="ansbtn" onclick="selectAnswer('ans1')">answer</button>
    <button id="ans2" class="ansbtn" onclick="selectAnswer('ans2')">answer</button>
    <button id="ans3" class="ansbtn" onclick="selectAnswer('ans3')">answer</button>
    <button id="ans4" class="ansbtn" onclick="selectAnswer('ans4')">answer</button>
   </section>

   <button id="submit-btn" disabled>SUBMIT</button>
   <button id="next-btn" class = "hidden">NEXT</button>
  </section>

  <section id="score-screen" class="hidden">
   <p>Your score is ...!</p>
   <button id="again">Start<br>Again</button>
  </section>
  
  <script src="questions.js"></script>
  <script src="script.js"></script>
 </body>
</html>
