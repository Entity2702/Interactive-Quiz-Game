<!DOCTYPE html>
<html>
 <head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>Interactive Quiz Game</title>
 </head>
 <body>
  <main>

   <section id="start-screen">
    <button id="start-btn" onclick="startGame()" aria-label="start game button">Start The Quiz!</button>
   </section>


   <section id="quiz-screen" class="hidden">
    <header id="progress" aria-label="progress bar">
     <div id="Rectangle1"></div>
     <div id="quiz-nodes"></div>
    </header>

    <section id="question" aria-label="question" aria-live="polite">
     <h2>question</h2>
    </section>

    <section id="answers" aria-label="answers" aria-live="polite"></section>

    <button id="submit-btn" disabled onclick="submit()" aria-label="submit button">SUBMIT</button>
    <button id="next-btn" class = "hidden" onclick="next()" aria-label="next button">NEXT</button>
   </section>


   <section id="score-screen" class="hidden">
    <h2>Your score is ...!</h2>
    <button id="again" onclick="startAgain()">Start<br>Again</button>
   </section>
   
   <script src="questions.js"></script>
   <script src="script.js"></script>

  </main>
 </body>
</html>
